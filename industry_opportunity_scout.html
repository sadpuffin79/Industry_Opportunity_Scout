<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Industry Ask Scout</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f4f3ef;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 32px 24px;
  }

  #root { max-width: 980px; margin: 0 auto; }

  header { margin-bottom: 24px; }
  header h1 { font-size: 20px; font-weight: 600; color: #111; margin-bottom: 4px; }
  header p  { font-size: 13px; color: #666; }

  .layout {
    display: grid;
    grid-template-columns: 230px 1fr;
    gap: 20px;
    align-items: start;
  }

  .panel {
    background: #fff;
    border-radius: 12px;
    border: 1px solid #e5e3dc;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #999;
    margin-bottom: 8px;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    background: #f4f3ef;
    border: 1px solid #e0ddd5;
    color: #333;
    margin: 0 4px 4px 0;
  }
  .tag button {
    background: none; border: none; cursor: pointer;
    color: #999; font-size: 14px; line-height: 1; padding: 0;
  }
  .tag button:hover { color: #333; }

  .add-row { display: flex; gap: 6px; margin-top: 4px; }
  .add-row input {
    flex: 1; padding: 6px 10px;
    border: 1px solid #e0ddd5; border-radius: 8px;
    font-size: 12px; background: #faf9f7; outline: none; color: #111;
  }
  .add-row input:focus { border-color: #aaa; }
  .add-row button {
    padding: 6px 10px; border: 1px solid #e0ddd5;
    border-radius: 8px; background: #faf9f7;
    cursor: pointer; font-size: 16px; color: #555;
  }
  .add-row button:hover { background: #f0ede6; }

  .divider { height: 1px; background: #f0ede6; }

  .plat-label {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 0; cursor: pointer; font-size: 13px; color: #333;
  }
  .plat-label input { accent-color: #555; width: 14px; height: 14px; }

  .api-row { display: flex; flex-direction: column; gap: 6px; }
  .api-row input {
    width: 100%; padding: 7px 10px;
    border: 1px solid #e0ddd5; border-radius: 8px;
    font-size: 12px; background: #faf9f7; color: #111; outline: none;
    font-family: monospace;
  }
  .api-row input:focus { border-color: #888; }
  .api-note { font-size: 11px; color: #aaa; }
  .api-note a { color: #888; }

  .run-btn {
    width: 100%; padding: 10px; border-radius: 8px;
    background: #1a1a1a; color: #fff; border: none;
    font-size: 13px; font-weight: 500; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .run-btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .run-btn:not(:disabled):hover { background: #333; }

  .export-btn {
    width: 100%; padding: 8px; border-radius: 8px;
    background: none; border: 1px solid #e0ddd5;
    font-size: 12px; color: #666; cursor: pointer;
  }
  .export-btn:hover { background: #f4f3ef; }

  .results-panel { display: flex; flex-direction: column; gap: 12px; }

  .log-box {
    background: #fff; border: 1px solid #e5e3dc;
    border-radius: 10px; padding: 12px 16px;
  }
  .log-toggle {
    background: none; border: none; cursor: pointer;
    font-size: 12px; color: #888; margin-bottom: 6px;
    display: flex; align-items: center; gap: 4px; padding: 0;
  }
  .log-line { display: flex; gap: 10px; padding: 1px 0; }
  .log-time { font-family: monospace; font-size: 11px; color: #bbb; flex-shrink: 0; }
  .log-msg  { font-family: monospace; font-size: 11px; color: #666; }

  .error-box {
    background: #fff5f5; border: 1px solid #fcd4d4;
    border-radius: 10px; padding: 12px 16px;
    font-size: 13px; color: #c0392b;
  }
  .error-box details { margin-top: 8px; }
  .error-box summary { cursor: pointer; font-size: 12px; }
  .error-box pre {
    font-size: 11px; margin-top: 6px; white-space: pre-wrap;
    word-break: break-word; max-height: 200px; overflow: auto; color: #555;
  }

  .empty-state {
    background: #fff; border: 1px solid #e5e3dc;
    border-radius: 12px; padding: 48px 24px;
    text-align: center; color: #bbb;
  }
  .empty-state .icon { font-size: 28px; margin-bottom: 10px; }
  .empty-state p { font-size: 13px; color: #999; }
  .empty-state p.sub { font-size: 12px; color: #bbb; margin-top: 4px; }

  .results-header { font-size: 12px; color: #999; padding: 0 2px; }

  .result-card {
    background: #fff; border: 1px solid #e5e3dc;
    border-radius: 12px; padding: 16px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .result-card:hover { border-color: #ccc; }

  .card-top {
    display: flex; align-items: flex-start;
    justify-content: space-between; gap: 8px; flex-wrap: wrap;
  }

  .badge {
    display: inline-block; padding: 2px 9px;
    border-radius: 20px; font-size: 11px; font-weight: 500;
  }
  .badge-research  { background: #e8f0fe; color: #1a56c4; }
  .badge-licensing { background: #e6f9f0; color: #1a7a4a; }
  .badge-collab    { background: #f0ecfe; color: #5b3fc4; }
  .badge-challenge { background: #fff8e6; color: #a06500; }
  .badge-other     { background: #f4f3ef; color: #666;    }

  .deadline  { font-size: 11px; color: #d97706; }
  .date-lbl  { font-size: 11px; color: #bbb; }
  .card-title { font-size: 14px; font-weight: 500; color: #111; line-height: 1.4; }
  .card-meta  { font-size: 12px; color: #777; }
  .card-desc  { font-size: 12px; color: #666; line-height: 1.6; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 2px; }
  .tech-tag  { font-size: 11px; color: #aaa; }
  .view-link { font-size: 11px; color: #1a56c4; text-decoration: none; }
  .view-link:hover { text-decoration: underline; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { display: inline-block; animation: spin 1s linear infinite; }
</style>
</head>
<body>
<div id="root"></div>
<script>
const { useState } = React;

const PLATFORMS = [
  { id: "inpart",        label: "In-Part",               activeUrl: "https://in-part.com/industry-needs" },
  { id: "halo",          label: "Halo Innovation",        activeUrl: "https://haloinnovation.com/challenges" },
  { id: "yet2",          label: "yet2",                   activeUrl: "https://yet2.com/tech-needs" },
  { id: "ninesigma",     label: "NineSigma",              activeUrl: "https://ninesigma.com/challenges" },
  { id: "wazoku",        label: "Wazoku / InnoCentive",   activeUrl: "https://app.wazoku.com/challenges" },
  { id: "openinnovation",label: "Open innovation portals",activeUrl: null },
];

const BADGE_CLASS = {
  "contract research": "badge-research",
  "licensing in":      "badge-licensing",
  "collaboration":     "badge-collab",
  "challenge / prize": "badge-challenge",
  "other":             "badge-other",
};
const BADGE_LABEL = {
  "contract research": "Contract research",
  "licensing in":      "Licensing in",
  "collaboration":     "Collaboration",
  "challenge / prize": "Challenge / prize",
  "other":             "Other",
};

function buildPrompt(platStr, themeStr, platUrls) {
  const today = new Date().toLocaleDateString("en-GB", { day:"numeric", month:"long", year:"numeric" });
  return "You are a technology transfer intelligence analyst working for a university. Today\'s date is " + today + ".\n\n"
    + "Find ACTIVE \"industry asks\" — posts where companies have published a technology need, research challenge, or collaboration request that a university research group could respond to RIGHT NOW.\n\n"
    + "You are NOT looking for universities advertising technologies. You are looking for INDUSTRY posting what they NEED.\n\n"
    + "CRITICAL — ACTIVE OPPORTUNITIES ONLY:\n"
    + "- Only return opportunities that are currently open and accepting responses as of " + today + "\n"
    + "- Exclude anything whose deadline has already passed\n"
    + "- Exclude anything posted more than 12 months ago unless it explicitly states it is still active\n"
    + "- If you cannot confirm an opportunity is still active, omit it\n"
    + "- Prefer results from the last 6 months\n\n"
    + "Platform-specific active listing pages — go to these URLs directly:\n"
    + platUrls + "\n\n"
    + "Search strategy:\n"
    + "1. Navigate directly to the active listing pages above — do not search generically\n"
    + "2. Look for technology needs matching the themes: " + themeStr + "\n"
    + "3. Confirm each result is still open before including it\n"
    + "4. Do NOT return case studies, past projects, news articles, or closed challenges\n\n"
    + "Return ONLY a valid JSON array — no preamble, no markdown fences, no explanation:\n"
    + "[{\n"
    + "  \"title\": \"title of the ask\",\n"
    + "  \"company\": \"company posting the need\",\n"
    + "  \"platform\": \"platform found on\",\n"
    + "  \"description\": \"2-3 sentences on what they need\",\n"
    + "  \"url\": \"direct URL to the active listing\",\n"
    + "  \"techArea\": \"technology area\",\n"
    + "  \"type\": \"contract research | licensing in | collaboration | challenge / prize | other\",\n"
    + "  \"deadline\": \"closing date if stated, else null\",\n"
    + "  \"date\": \"date posted if visible, else null\",\n"
    + "  \"activeStatus\": \"confirmed open | assumed open | unknown\"\n"
    + "}]\n\n"
    + "Return only real, verifiable, currently active industry asks. Do not invent entries.";
}

function App() {
  const [apiKey,    setApiKey]    = useState("");
  const [themes,    setThemes]    = useState(["materials science", "medical devices", "AI / machine learning"]);
  const [newTheme,  setNewTheme]  = useState("");
  const [platforms, setPlatforms] = useState(["inpart", "halo", "yet2", "ninesigma"]);
  const [running,   setRunning]   = useState(false);
  const [results,   setResults]   = useState(null);
  const [log,       setLog]       = useState([]);
  const [showLog,   setShowLog]   = useState(true);
  const [error,     setError]     = useState(null);
  const [raw,       setRaw]       = useState(null);

  const addTheme = () => {
    const t = newTheme.trim();
    if (t && !themes.includes(t)) { setThemes(p => [...p, t]); setNewTheme(""); }
  };

  const runSearch = async () => {
    if (!apiKey.trim()) { setError("Please enter your OpenAI API key."); return; }

    setRunning(true); setResults(null); setError(null); setRaw(null); setShowLog(true);

    const logs = [];
    const addLog = msg => { logs.push({ t: new Date().toLocaleTimeString("en-GB"), msg }); setLog([...logs]); };

    const selPlats  = PLATFORMS.filter(p => platforms.includes(p.id));
    const platStr   = selPlats.map(p => p.label).join(", ");
    const themeStr  = themes.join(", ");
    const platUrls  = selPlats
      .filter(p => p.activeUrl)
      .map(p => "- " + p.label + ": " + p.activeUrl)
      .join("\n");

    addLog("Starting search agent...");
    addLog("Platforms: " + platStr);
    addLog("Themes: " + themeStr);
    addLog("Searching active listings only...");

    const today = new Date().toLocaleDateString("en-GB", { day:"numeric", month:"long", year:"numeric" });
    const userMessage = "Search the active listings on " + platStr + " for current open industry asks related to: " + themeStr + ". Today is " + today + ". Return only active, open opportunities as a JSON array.";

    try {
      addLog("Calling OpenAI with web search...");

      const resp = await fetch("https://api.openai.com/v1/responses", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + apiKey.trim(),
        },
        body: JSON.stringify({
          model: "gpt-4o",
          tools: [{ type: "web_search_preview" }],
          instructions: buildPrompt(platStr, themeStr, platUrls),
          input: userMessage,
        })
      });

      const data = await resp.json();
      if (data.error) throw new Error(data.error.message);
      addLog("Response received. Parsing...");

      const text = (data.output || [])
        .filter(b => b.type === "message")
        .flatMap(b => b.content || [])
        .filter(c => c.type === "output_text")
        .map(c => c.text)
        .join("\n");

      setRaw(text);

      let opps = [];
      const m = text.replace(/```json|```/g, "").match(/\[[\s\S]*\]/);
      if (m) {
        try {
          opps = JSON.parse(m[0]);
          addLog("Parsed " + opps.length + " industry ask" + (opps.length === 1 ? "" : "s") + ".");
        } catch {
          addLog("JSON parse error — raw response available.");
          setError("Could not parse structured results. See raw output.");
        }
      } else {
        addLog("No JSON array found in response.");
        setError("Results in narrative format — see raw output.");
      }
      setResults(opps);

    } catch (err) {
      addLog("Error: " + err.message);
      setError(err.message);
    }

    addLog("Done.");
    setRunning(false);
  };

  const exportCSV = () => {
    if (!results?.length) return;
    const cols = ["title","company","platform","type","techArea","description","url","deadline","date","activeStatus"];
    const rows = results.map(r => cols.map(k => "\"" + (r[k]||"").toString().replace(/"/g,'\\""\') + "\"").join(","));
    const a = document.createElement("a");
    a.href = "data:text/csv;charset=utf-8," + encodeURIComponent([cols.join(","), ...rows].join("\n"));
    a.download = "industry-asks.csv";
    a.click();
  };

  const badgeClass = r => BADGE_CLASS[(r.type||"").toLowerCase()] || "badge-other";
  const badgeLabel = r => BADGE_LABEL[(r.type||"").toLowerCase()] || "Other";

  const STATUS_STYLE = {
    "confirmed open": { color: "#1a7a4a", bg: "#e6f9f0" },
    "assumed open":   { color: "#a06500", bg: "#fff8e6" },
    "unknown":        { color: "#888",    bg: "#f4f3ef" },
  };
  const statusStyle = r => STATUS_STYLE[(r.activeStatus||"").toLowerCase()] || STATUS_STYLE["unknown"];

  const e = React.createElement;

  return e("div", null,
    e("header", null,
      e("h1", null, "Industry Ask Scout"),
      e("p",  null, "Find active technology needs and research requests posted by industry — for your university TTO.")
    ),

    e("div", { className: "layout" },

      e("div", { className: "panel" },

        e("div", { className: "api-row" },
          e("div", { className: "section-label" }, "OpenAI API key"),
          e("input", {
            type: "password",
            value: apiKey,
            onChange: ev => setApiKey(ev.target.value),
            placeholder: "sk-...",
            autoComplete: "off",
          }),
          e("span", { className: "api-note" },
            "Get a key at ",
            e("a", { href: "https://platform.openai.com/api-keys", target: "_blank", rel: "noopener" }, "platform.openai.com"),
            ". Not stored."
          )
        ),

        e("div", { className: "divider" }),

        e("div", null,
          e("div", { className: "section-label" }, "Research themes"),
          e("div", { style: { marginBottom: 8 } },
            themes.map(t => e("span", { key: t, className: "tag" },
              t,
              e("button", { onClick: () => setThemes(p => p.filter(x => x !== t)), title: "Remove" }, "×")
            ))
          ),
          e("div", { className: "add-row" },
            e("input", {
              value: newTheme,
              onChange: ev => setNewTheme(ev.target.value),
              onKeyDown: ev => ev.key === "Enter" && addTheme(),
              placeholder: "Add theme…"
            }),
            e("button", { onClick: addTheme }, "+")
          )
        ),

        e("div", { className: "divider" }),

        e("div", null,
          e("div", { className: "section-label" }, "Platforms to search"),
          PLATFORMS.map(p => e("label", { key: p.id, className: "plat-label" },
            e("input", {
              type: "checkbox",
              checked: platforms.includes(p.id),
              onChange: () => setPlatforms(prev =>
                prev.includes(p.id) ? prev.filter(x => x !== p.id) : [...prev, p.id]
              )
            }),
            p.label
          ))
        ),

        e("div", { className: "divider" }),

        e("button", {
          className: "run-btn",
          onClick: runSearch,
          disabled: running || !apiKey.trim() || themes.length === 0 || platforms.length === 0
        },
          running
            ? e(React.Fragment, null, e("span", { className: "spin" }, "↻"), " Searching…")
            : "🔍 Find active asks"
        ),

        results?.length > 0 &&
          e("button", { className: "export-btn", onClick: exportCSV }, "↓ Export CSV")
      ),

      e("div", { className: "results-panel" },

        log.length > 0 && e("div", { className: "log-box" },
          e("button", { className: "log-toggle", onClick: () => setShowLog(p => !p) },
            (showLog ? "▾" : "▸") + " Search log"
          ),
          showLog && e("div", { style: { display: "flex", flexDirection: "column", gap: 3 } },
            log.map((l, i) => e("div", { key: i, className: "log-line" },
              e("span", { className: "log-time" }, l.t),
              e("span", { className: "log-msg"  }, l.msg)
            ))
          )
        ),

        error && e("div", { className: "error-box" },
          "⚠ " + error,
          raw && e("details", null,
            e("summary", null, "Show raw response"),
            e("pre", null, raw)
          )
        ),

        results === null && !running && e("div", { className: "empty-state" },
          e("div", { className: "icon" }, "🏭"),
          e("p", null, "Find what industry is looking for."),
          e("p", { className: "sub" }, "Add your API key, set themes, and run a search.")
        ),

        results?.length === 0 && e("div", { className: "empty-state" },
          e("p", null, "No active results found. Try broader themes or different platforms.")
        ),

        results?.length > 0 && e(React.Fragment, null,
          e("div", { className: "results-header" },
            results.length + " active industry ask" + (results.length === 1 ? "" : "s") + " found"
          ),
          results.map((r, i) => e("div", { key: i, className: "result-card" },
            e("div", { className: "card-top" },
              e("div", { style: { display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" } },
                e("span", { className: "badge " + badgeClass(r) }, badgeLabel(r)),
                r.activeStatus && e("span", {
                  style: {
                    fontSize: 11, fontWeight: 500, padding: "2px 8px", borderRadius: 20,
                    background: statusStyle(r).bg, color: statusStyle(r).color
                  }
                }, r.activeStatus)
              ),
              e("div", { style: { display: "flex", gap: 10, alignItems: "center" } },
                r.deadline && e("span", { className: "deadline" }, "⏱ " + r.deadline),
                r.date     && e("span", { className: "date-lbl" }, r.date)
              )
            ),
            e("div", { className: "card-title" }, r.title || "Untitled"),
            e("div", { className: "card-meta"  },
              r.company || "Unknown",
              r.platform && (" · " + r.platform)
            ),
            r.description && e("div", { className: "card-desc" }, r.description),
            e("div", { className: "card-footer" },
              r.techArea && e("span", { className: "tech-tag" }, "# " + r.techArea),
              r.url && e("a", {
                href: r.url, target: "_blank", rel: "noopener noreferrer", className: "view-link"
              }, "View ↗")
            )
          ))
        )
      )
    )
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
