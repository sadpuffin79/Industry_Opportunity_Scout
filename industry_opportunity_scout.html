<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Industry Ask Scout</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f4f3ef; color: #1a1a1a; min-height: 100vh; padding: 32px 24px;
  }
  #root { max-width: 980px; margin: 0 auto; }
  header { margin-bottom: 24px; }
  header h1 { font-size: 20px; font-weight: 600; color: #111; margin-bottom: 4px; }
  header p  { font-size: 13px; color: #666; }
  .layout { display: grid; grid-template-columns: 240px 1fr; gap: 20px; align-items: start; }
  .panel { background: #fff; border-radius: 12px; border: 1px solid #e5e3dc; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
  .slabel { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: #999; margin-bottom: 6px; }
  .tag { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 12px; background: #f4f3ef; border: 1px solid #e0ddd5; color: #333; margin: 0 4px 4px 0; }
  .tag button { background: none; border: none; cursor: pointer; color: #999; font-size: 14px; line-height: 1; padding: 0; }
  .tag button:hover { color: #333; }
  .add-row { display: flex; gap: 6px; margin-top: 4px; }
  .add-row input { flex: 1; padding: 6px 10px; border: 1px solid #e0ddd5; border-radius: 8px; font-size: 12px; background: #faf9f7; outline: none; color: #111; }
  .add-row input:focus { border-color: #aaa; }
  .add-row button { padding: 6px 10px; border: 1px solid #e0ddd5; border-radius: 8px; background: #faf9f7; cursor: pointer; font-size: 16px; color: #555; }
  .add-row button:hover { background: #f0ede6; }
  .divider { height: 1px; background: #f0ede6; }
  .plat { display: flex; align-items: center; gap: 8px; padding: 4px 0; cursor: pointer; font-size: 12px; color: #333; }
  .plat input { accent-color: #555; width: 13px; height: 13px; flex-shrink: 0; }
  .plat-group-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: #bbb; margin: 8px 0 4px; }
  .api-input { width: 100%; padding: 7px 10px; border: 1px solid #e0ddd5; border-radius: 8px; font-size: 12px; background: #faf9f7; color: #111; outline: none; font-family: monospace; }
  .api-input:focus { border-color: #888; }
  .api-note { font-size: 11px; color: #aaa; }
  .api-note a { color: #888; }
  .run-btn { width: 100%; padding: 10px; border-radius: 8px; background: #1a1a1a; color: #fff; border: none; font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .run-btn:disabled { opacity: .45; cursor: not-allowed; }
  .run-btn:not(:disabled):hover { background: #333; }
  .exp-btn { width: 100%; padding: 8px; border-radius: 8px; background: none; border: 1px solid #e0ddd5; font-size: 12px; color: #666; cursor: pointer; }
  .exp-btn:hover { background: #f4f3ef; }
  .results { display: flex; flex-direction: column; gap: 12px; }
  .log-box { background: #fff; border: 1px solid #e5e3dc; border-radius: 10px; padding: 12px 16px; }
  .log-toggle { background: none; border: none; cursor: pointer; font-size: 12px; color: #888; display: flex; align-items: center; gap: 4px; padding: 0; margin-bottom: 6px; }
  .log-line { display: flex; gap: 10px; padding: 1px 0; }
  .log-t { font-family: monospace; font-size: 11px; color: #bbb; flex-shrink: 0; }
  .log-m { font-family: monospace; font-size: 11px; color: #666; }
  .err-box { background: #fff5f5; border: 1px solid #fcd4d4; border-radius: 10px; padding: 12px 16px; font-size: 13px; color: #c0392b; }
  .err-box details { margin-top: 8px; }
  .err-box summary { cursor: pointer; font-size: 12px; }
  .err-box pre { font-size: 11px; margin-top: 6px; white-space: pre-wrap; word-break: break-word; max-height: 200px; overflow: auto; color: #555; }
  .empty { background: #fff; border: 1px solid #e5e3dc; border-radius: 12px; padding: 48px 24px; text-align: center; }
  .empty .icon { font-size: 28px; margin-bottom: 10px; }
  .empty p { font-size: 13px; color: #999; }
  .empty p.sub { font-size: 12px; color: #bbb; margin-top: 4px; }
  .res-header { font-size: 12px; color: #999; padding: 0 2px; }
  .card { background: #fff; border: 1px solid #e5e3dc; border-radius: 12px; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
  .card:hover { border-color: #ccc; }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
  .card-badges { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .card-dates  { display: flex; gap: 10px; align-items: center; }
  .badge { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .b-research  { background: #e8f0fe; color: #1a56c4; }
  .b-licensing { background: #e6f9f0; color: #1a7a4a; }
  .b-collab    { background: #f0ecfe; color: #5b3fc4; }
  .b-challenge { background: #fff8e6; color: #a06500; }
  .b-other     { background: #f4f3ef; color: #666;    }
  .b-confirmed { background: #e6f9f0; color: #1a7a4a; }
  .b-assumed   { background: #fff8e6; color: #a06500; }
  .b-unknown   { background: #f4f3ef; color: #888;    }
  .deadline { font-size: 11px; color: #d97706; }
  .date-lbl { font-size: 11px; color: #bbb; }
  .card-title { font-size: 14px; font-weight: 500; color: #111; line-height: 1.4; }
  .card-meta  { font-size: 12px; color: #777; }
  .card-desc  { font-size: 12px; color: #666; line-height: 1.6; }
  .card-foot  { display: flex; align-items: center; justify-content: space-between; margin-top: 2px; }
  .tech-tag   { font-size: 11px; color: #aaa; }
  .view-link  { font-size: 11px; color: #1a56c4; text-decoration: none; }
  .view-link:hover { text-decoration: underline; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { display: inline-block; animation: spin 1s linear infinite; }
</style>
</head>
<body>
<div id="root"></div>
<script>
const { useState } = React;

const PLATFORM_GROUPS = [
  {
    group: "Open innovation platforms",
    platforms: [
      { id: "inpart",    label: "In-Part",             activeUrl: "https://in-part.com/industry-needs" },
      { id: "halo",      label: "Halo Innovation",      activeUrl: "https://haloinnovation.com/challenges" },
      { id: "yet2",      label: "yet2",                 activeUrl: "https://yet2.com/tech-needs" },
      { id: "ninesigma", label: "NineSigma",            activeUrl: "https://ninesigma.com/challenges" },
      { id: "wazoku",    label: "Wazoku / InnoCentive", activeUrl: "https://app.wazoku.com/challenges" },
      { id: "agorize",   label: "Agorize",              activeUrl: "https://agorize.com/en/challenges" },
      { id: "ennomotive",label: "Ennomotive",           activeUrl: "https://www.ennomotive.com/engineering-challenges" },
    ]
  },
  {
    group: "UK funding & government",
    platforms: [
      { id: "innovateuk", label: "Innovate UK (IFS)",    activeUrl: "https://apply-for-innovation-funding.service.gov.uk/competition/search" },
      { id: "ktn",        label: "KTN UK",               activeUrl: "https://ktn-uk.org/opportunities" },
      { id: "findtender", label: "Find a Tender",        activeUrl: "https://www.find-tender.service.gov.uk/Search" },
      { id: "catapult",   label: "Catapult Network",     activeUrl: "https://catapult.org.uk/our-work/challenges" },
    ]
  },
  {
    group: "European & international",
    platforms: [
      { id: "eufunding",  label: "EU Funding & Tenders", activeUrl: "https://ec.europa.eu/info/funding-tenders/opportunities/portal/screen/opportunities/calls-for-proposals" },
      { id: "presans",    label: "Presans",              activeUrl: "https://presans.com/technology-needs" },
    ]
  }
];

const ALL_PLATFORMS = PLATFORM_GROUPS.flatMap(g => g.platforms);

const BADGE_CLASS = {
  "contract research": "b-research",
  "licensing in":      "b-licensing",
  "collaboration":     "b-collab",
  "challenge / prize": "b-challenge",
  "other":             "b-other",
};
const BADGE_LABEL = {
  "contract research": "Contract research",
  "licensing in":      "Licensing in",
  "collaboration":     "Collaboration",
  "challenge / prize": "Challenge / prize",
  "other":             "Other",
};
const STATUS_CLASS = {
  "confirmed open": "b-confirmed",
  "assumed open":   "b-assumed",
  "unknown":        "b-unknown",
};

function buildPrompt(platStr, themeStr, platUrls) {
  var today = new Date().toLocaleDateString("en-GB", { day:"numeric", month:"long", year:"numeric" });
  var lines = [];
  lines.push("You are a technology transfer intelligence analyst working for a university. Today's date is " + today + ".");
  lines.push("");
  lines.push("Find ACTIVE \"industry asks\" — posts where companies or public bodies have published a technology need, research challenge, or collaboration request that a university research group could respond to RIGHT NOW.");
  lines.push("");
  lines.push("You are NOT looking for universities advertising their own technologies. You are looking for INDUSTRY or GOVERNMENT posting what they NEED from universities or external researchers.");
  lines.push("");
  lines.push("CRITICAL — ACTIVE OPPORTUNITIES ONLY:");
  lines.push("- Only return opportunities that are currently open and accepting responses as of " + today);
  lines.push("- Exclude anything whose deadline has already passed");
  lines.push("- Exclude anything posted more than 12 months ago unless it explicitly states it is still active");
  lines.push("- If you cannot confirm an opportunity is still active, omit it");
  lines.push("- Prefer results from the last 6 months");
  lines.push("");
  lines.push("Platform-specific active listing pages — go to these URLs directly:");
  lines.push(platUrls);
  lines.push("");
  lines.push("Search strategy:");
  lines.push("1. Navigate directly to the active listing pages above");
  lines.push("2. Look specifically for technology needs matching: " + themeStr);
  lines.push("3. For Find a Tender, search for R&D and research collaboration tenders");
  lines.push("4. For Innovate UK, look for open competitions inviting university participation");
  lines.push("5. Confirm each result is still open before including it");
  lines.push("6. Do NOT return case studies, past projects, news articles, or closed challenges");
  lines.push("");
  lines.push("Return ONLY a valid JSON array. No preamble, no markdown fences, no explanation:");
  lines.push("[{");
  lines.push("  \"title\": \"title of the ask\",");
  lines.push("  \"company\": \"company or organisation posting the need\",");
  lines.push("  \"platform\": \"platform found on\",");
  lines.push("  \"description\": \"2-3 sentences on what they need\",");
  lines.push("  \"url\": \"direct URL to the active listing\",");
  lines.push("  \"techArea\": \"technology area\",");
  lines.push("  \"type\": \"contract research or licensing in or collaboration or challenge / prize or other\",");
  lines.push("  \"deadline\": \"closing date if stated, else null\",");
  lines.push("  \"date\": \"date posted if visible, else null\",");
  lines.push("  \"activeStatus\": \"confirmed open or assumed open or unknown\"");
  lines.push("}]");
  lines.push("");
  lines.push("Return only real, verifiable, currently active opportunities. Do not invent entries.");
  return lines.join("\n");
}

function App() {
  var S = useState;
  var [apiKey,    setApiKey]    = S("");
  var [themes,    setThemes]    = S(["materials science", "medical devices", "AI / machine learning"]);
  var [newTheme,  setNewTheme]  = S("");
  var [selPlats,  setSelPlats]  = S(["inpart","halo","yet2","ninesigma","innovateuk","ktn"]);
  var [running,   setRunning]   = S(false);
  var [results,   setResults]   = S(null);
  var [log,       setLog]       = S([]);
  var [showLog,   setShowLog]   = S(true);
  var [error,     setError]     = S(null);
  var [raw,       setRaw]       = S(null);

  function addTheme() {
    var t = newTheme.trim();
    if (t && !themes.includes(t)) { setThemes(function(p){ return p.concat([t]); }); setNewTheme(""); }
  }

  async function runSearch() {
    if (!apiKey.trim()) { setError("Please enter your OpenAI API key."); return; }
    setRunning(true); setResults(null); setError(null); setRaw(null); setShowLog(true);

    var logs = [];
    function addLog(msg) { logs.push({ t: new Date().toLocaleTimeString("en-GB"), msg: msg }); setLog(logs.slice()); }

    var chosen  = ALL_PLATFORMS.filter(function(p){ return selPlats.includes(p.id); });
    var platStr = chosen.map(function(p){ return p.label; }).join(", ");
    var themeStr = themes.join(", ");
    var platUrls = chosen.filter(function(p){ return p.activeUrl; })
                         .map(function(p){ return "- " + p.label + ": " + p.activeUrl; }).join("\n");

    addLog("Starting search agent...");
    addLog("Platforms: " + platStr);
    addLog("Themes: " + themeStr);
    addLog("Searching active listings only...");

    var today = new Date().toLocaleDateString("en-GB", { day:"numeric", month:"long", year:"numeric" });
    var userMsg = "Search the active listings on " + platStr + " for currently open industry asks related to: " + themeStr + ". Today is " + today + ". Return only active, open opportunities as a JSON array.";

    try {
      addLog("Calling OpenAI with web search...");
      var resp = await fetch("https://api.openai.com/v1/responses", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + apiKey.trim() },
        body: JSON.stringify({
          model: "gpt-4o",
          tools: [{ type: "web_search_preview" }],
          instructions: buildPrompt(platStr, themeStr, platUrls),
          input: userMsg
        })
      });

      var data = await resp.json();
      if (data.error) throw new Error(data.error.message);
      addLog("Response received. Parsing...");

      var text = (data.output || [])
        .filter(function(b){ return b.type === "message"; })
        .flatMap(function(b){ return b.content || []; })
        .filter(function(c){ return c.type === "output_text"; })
        .map(function(c){ return c.text; })
        .join("\n");

      setRaw(text);

      var opps = [];
      var cleaned = text.replace(/```json|```/g, "");
      var m = cleaned.match(/\[[\s\S]*\]/);
      if (m) {
        try {
          opps = JSON.parse(m[0]);
          addLog("Parsed " + opps.length + " opportunit" + (opps.length === 1 ? "y" : "ies") + ".");
        } catch(pe) {
          addLog("JSON parse error — raw response available.");
          setError("Could not parse structured results. See raw output.");
        }
      } else {
        addLog("No JSON array in response.");
        setError("Results in narrative format — see raw output.");
      }
      setResults(opps);

    } catch(err) {
      addLog("Error: " + err.message);
      setError(err.message);
    }
    addLog("Done.");
    setRunning(false);
  }

  function exportCSV() {
    if (!results || !results.length) return;
    var cols = ["title","company","platform","type","techArea","description","url","deadline","date","activeStatus"];
    var header = cols.join(",");
    var rows = results.map(function(r) {
      return cols.map(function(k) {
        var val = (r[k] || "").toString().replace(/"/g, '""');
        return '"' + val + '"';
      }).join(",");
    });
    var csv = [header].concat(rows).join("\n");
    var a = document.createElement("a");
    a.href = "data:text/csv;charset=utf-8," + encodeURIComponent(csv);
    a.download = "industry-asks.csv";
    a.click();
  }

  function togglePlat(id) {
    setSelPlats(function(prev) {
      return prev.includes(id) ? prev.filter(function(x){ return x !== id; }) : prev.concat([id]);
    });
  }

  function bClass(r) { return BADGE_CLASS[(r.type||"").toLowerCase()] || "b-other"; }
  function bLabel(r) { return BADGE_LABEL[(r.type||"").toLowerCase()] || "Other"; }
  function sClass(r) { return STATUS_CLASS[(r.activeStatus||"").toLowerCase()] || "b-unknown"; }

  var e = React.createElement;

  return e("div", null,
    e("header", null,
      e("h1", null, "Industry Ask Scout"),
      e("p",  null, "Find active technology needs and research requests posted by industry — for your university TTO.")
    ),
    e("div", { className: "layout" },

      // ── Left panel ──
      e("div", { className: "panel" },

        e("div", null,
          e("div", { className: "slabel" }, "OpenAI API key"),
          e("input", { className: "api-input", type: "password", value: apiKey,
            onChange: function(ev){ setApiKey(ev.target.value); },
            placeholder: "sk-...", autoComplete: "off" }),
          e("div", { className: "api-note" },
            "Get a key at ",
            e("a", { href: "https://platform.openai.com/api-keys", target: "_blank", rel: "noopener" }, "platform.openai.com"),
            ". Not stored."
          )
        ),

        e("div", { className: "divider" }),

        e("div", null,
          e("div", { className: "slabel" }, "Research themes"),
          e("div", { style: { marginBottom: 8 } },
            themes.map(function(t) {
              return e("span", { key: t, className: "tag" },
                t,
                e("button", { onClick: function(){ setThemes(function(p){ return p.filter(function(x){ return x !== t; }); }); }, title: "Remove" }, "×")
              );
            })
          ),
          e("div", { className: "add-row" },
            e("input", { value: newTheme,
              onChange: function(ev){ setNewTheme(ev.target.value); },
              onKeyDown: function(ev){ if (ev.key === "Enter") addTheme(); },
              placeholder: "Add theme…" }),
            e("button", { onClick: addTheme }, "+")
          )
        ),

        e("div", { className: "divider" }),

        e("div", null,
          e("div", { className: "slabel" }, "Platforms"),
          PLATFORM_GROUPS.map(function(g) {
            return e("div", { key: g.group },
              e("div", { className: "plat-group-label" }, g.group),
              g.platforms.map(function(p) {
                return e("label", { key: p.id, className: "plat" },
                  e("input", { type: "checkbox", checked: selPlats.includes(p.id),
                    onChange: function(){ togglePlat(p.id); } }),
                  p.label
                );
              })
            );
          })
        ),

        e("div", { className: "divider" }),

        e("button", { className: "run-btn", onClick: runSearch,
          disabled: running || !apiKey.trim() || themes.length === 0 || selPlats.length === 0 },
          running
            ? e(React.Fragment, null, e("span", { className: "spin" }, "↻"), " Searching…")
            : "🔍 Find active asks"
        ),

        results && results.length > 0 &&
          e("button", { className: "exp-btn", onClick: exportCSV }, "↓ Export CSV")
      ),

      // ── Right: results ──
      e("div", { className: "results" },

        log.length > 0 && e("div", { className: "log-box" },
          e("button", { className: "log-toggle", onClick: function(){ setShowLog(function(p){ return !p; }); } },
            (showLog ? "▾" : "▸") + " Search log"
          ),
          showLog && e("div", { style: { display: "flex", flexDirection: "column", gap: 2 } },
            log.map(function(l, i) {
              return e("div", { key: i, className: "log-line" },
                e("span", { className: "log-t" }, l.t),
                e("span", { className: "log-m" }, l.msg)
              );
            })
          )
        ),

        error && e("div", { className: "err-box" },
          "⚠ " + error,
          raw && e("details", null,
            e("summary", null, "Show raw response"),
            e("pre", null, raw)
          )
        ),

        results === null && !running && e("div", { className: "empty" },
          e("div", { className: "icon" }, "🏭"),
          e("p", null, "Find what industry is looking for."),
          e("p", { className: "sub" }, "Add your API key, set themes, and run a search.")
        ),

        results && results.length === 0 && e("div", { className: "empty" },
          e("p", null, "No active results found. Try broader themes or more platforms.")
        ),

        results && results.length > 0 && e(React.Fragment, null,
          e("div", { className: "res-header" },
            results.length + " active opportunit" + (results.length === 1 ? "y" : "ies") + " found"
          ),
          results.map(function(r, i) {
            return e("div", { key: i, className: "card" },
              e("div", { className: "card-top" },
                e("div", { className: "card-badges" },
                  e("span", { className: "badge " + bClass(r) }, bLabel(r)),
                  r.activeStatus && e("span", { className: "badge " + sClass(r) }, r.activeStatus)
                ),
                e("div", { className: "card-dates" },
                  r.deadline && e("span", { className: "deadline" }, "⏱ " + r.deadline),
                  r.date      && e("span", { className: "date-lbl" }, r.date)
                )
              ),
              e("div", { className: "card-title" }, r.title || "Untitled"),
              e("div", { className: "card-meta"  },
                r.company || "Unknown",
                r.platform ? " · " + r.platform : ""
              ),
              r.description && e("div", { className: "card-desc" }, r.description),
              e("div", { className: "card-foot" },
                r.techArea && e("span", { className: "tech-tag" }, "# " + r.techArea),
                r.url && e("a", { href: r.url, target: "_blank", rel: "noopener noreferrer", className: "view-link" }, "View ↗")
              )
            );
          })
        )
      )
    )
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
